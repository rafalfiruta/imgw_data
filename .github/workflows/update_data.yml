name: Hourly IMGW Data Update

on:
  schedule:
    # Odpala siï؟½ 15 ORAZ 45 minut po kaï؟½dej peï؟½nej godzinie (wiï؟½ksza szansa na punktualnoï؟½ï؟½)
    - cron: '15,45 * * * *'  
  workflow_dispatch:     # Pozwala teï؟½ uruchomiï؟½ skrypt rï؟½cznie jednym klikniï؟½ciem

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Sprawdzenie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Uruchomienie skryptu bazy danych IMGW
      run: python imgw_data.py

    - name: Automatyczny zapis bazy do repozytorium
      run: |
        git config --global user.name "IMGW Data Bot"
        git config --global user.email "actions@github.com"

        date_str=$(python -c 'from datetime import datetime; import zoneinfo; print(datetime.now(zoneinfo.ZoneInfo("Europe/Warsaw")).strftime("%Y-%m-%d"))')
        dated_file="imgw_data/${date_str}.geojson"

        if [ -f "imgw_data.geojson" ] && [ -f "imgw_data/dates.json" ] && [ -f "$dated_file" ]; then
          git add imgw_data.geojson imgw_data/dates.json "$dated_file"
          if ! git diff --cached --quiet; then
            git commit -m "Aktualizacja bazy godzinowej IMGW: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "Brak nowych danych do zapisania."
          fi
        else
          echo "Bإ‚ؤ…d: oczekiwane pliki nie powstaإ‚y podczas dziaإ‚ania skryptu Pythona."
          echo "Sprawdإ؛, czy wygenerowano: imgw_data.geojson, imgw_data/dates.json, $dated_file"
          exit 1
        fi